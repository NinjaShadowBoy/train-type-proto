<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Logging Form</title>
    <!-- <link rel="stylesheet" href="style.css"> -->
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/logo.css" />
    <link rel="stylesheet" href="css/login.css" />
  </head>

  <body>
    <div class="typing-logo"></div>
    <div class="wrapper">
      <form class="login-form" action="">
        <h1>Login</h1>
        <div class="input-box">
          <input class="username" type="text" placeholder="username" required />
          <i class="bx bxs-user-circle"></i>
        </div>
        <div class="input-box">
          <input
            class="password"
            type="password"
            placeholder="password"
            required
          />
          <i class="bx bxs-lock-alt"></i>
        </div>
        <div class="remember-forgot">
          <label for=""><input type="checkbox" />Remember me?</label>
          <a href="#" style="color: gray"> Forgot password?</a>
        </div>
        <input
          class="login-button"
          type="submit"
          style="color: black"
          value="LOGIN"
        />
        <input
          class="login-button"
          type="submit"
          style="color: black"
          value="SIGNUP"
        />
        <!-- <div class="register-link">
          <p>Dont have account?? <a href="#">Register</a></p>
        </div> -->
      </form>
    </div>

    <script src="jquery-3.7.1.min.js"></script>
    <script type="module" src="model.js"></script>
    <script type="module" src="login.js"></script>
    <script src="logo.js"></script>
  </body>
</html>
