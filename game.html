<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISI Type</title>
    <link rel="stylesheet" href="game.css" />
    <link rel="stylesheet" href="logo.css" />
    <link rel="stylesheet" href="speedometer.css" />
  </head>

  <body>
    <div class="typing-logo"></div>
    <main class="game-container">
      <div id="header">
        <div class="game-title">
          <div class="">ISI Type</div>
          <div class="timer"></div>
          <button type="reset" id="Type-again-button">Type Again</button>
        </div>
        <div class="gaugeinfo">
          <div
            class="gauge speed-gauge"
            data-colors="#56e9d3ff #56e969ff #e8f54aff #fb8132ff #fb3232ff"
            data-text="WPM"
          ></div>
          <div
            class="gauge acc-gauge"
            data-colors="#56e9d3ff #56e969ff #e8f54aff #fb8132ff #fb3232ff"
            data-text="ACC%"
          ></div>
        </div>
      </div>
      <hr />
      <div class="results">
        <div
          class="gauge aspeed-gauge"
          data-colors="#56e9d3ff #56e969ff #e8f54aff #fb8132ff #fb3232ff"
          data-text="AWPM"
        ></div>
        <div class="stats">
          <p class="words-typed">words typed</p>
          <p class="correctly">
            words typed <span class="correct">correctly</span>
          </p>
          <p class="incorrectly">
            words typed <span class="incorrect underlined">incorrectly</span>
          </p>
        </div>
        <div class="errors">
          <h4>
            <span class="number_of_errors incorrect">123</span> Mistyped letters
          </h4>
          <div class="errors-details">
            <!-- <p>'a': 11 times</p>
            <p>'a': 11 times</p>
            <p>'a': 11 times</p>
            <p>'a': 11 times</p>
            <p>'a': 11 times</p>
            <p>'a': 11 times</p>
            <p>'a': 11 times</p> -->
          </div>
        </div>
      </div>
      <hr />
      <div id="game" tabindex="0">
        <div id="words">
          <div id="cursor"></div>
          <div id="opponent-cursor"></div>
          Emptied in the begining by game.js
        </div>
        <div id="focus-error">Click here to focus</div>
      </div>
    </main>
    
    <script src="jquery-3.7.1.min.js"></script>
    <script type="module" src="peerjs.min.js"></script>
    <script src="speedometer.js"></script>
    <script type="module" src="model.js"></script>
    <script src="logo.js"></script>
    <!-- <script type="module" src="dash.js"></script> -->
    <script type="module" src="game.js"></script>
  </body>
</html>
