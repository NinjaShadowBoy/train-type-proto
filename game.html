<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ISI Type</title>
    <link rel="stylesheet" href="game.css" />
    <link rel="stylesheet" href="logo.css" />
    <link rel="stylesheet" href="speedometer.css" />
  </head>

  <body>
    <div class="typing-logo"></div>
    <main class="game-container">
      <div id="header">
        <div class="game-title">
          <div class="">ISI Type</div>
          <div class="timer"></div>
          <button type="reset" id="Type-again-button">Type Again</button>
        </div>
        <div class="gaugeinfo">
          <div
            class="gauge speed-gauge"
            data-colors="#56e9d3ff #56e969ff #e8f54aff #fb8132ff #fb3232ff"
            data-text="WPM"
          ></div>
          <div
            class="gauge acc-gauge"
            data-colors="#56e9d3ff #56e969ff #e8f54aff #fb8132ff #fb3232ff"
            data-text="ACC%"
          ></div>
        </div>
      </div>
      <hr />
      <div id="game" tabindex="0">
        <div id="words">
          <div id="cursor"></div>
          Emptied in the begining by game.js
        </div>
        <div id="focus-error">Click here to focus</div>
      </div>
    </main>

    <script src="jquery-3.7.1.min.js"></script>
    <script src="speedometer.js"></script>
    <script src="model.js"></script>
    <script src="logo.js"></script>
    <script src="game.js"></script>
  </body>
</html>
